    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly.js" autostart="false"></script>
    <script>
        // 現在のURLに「github.io」が含まれているか（本番環境かどうか）を判定
        const isGitHubPages = window.location.hostname.includes('github.io');

        if (isGitHubPages) {
            // 🌐 GitHub Pages（iPhone/本番用）：圧縮ファイルのバグを回避して起動
            Blazor.start({
                loadBootResource: function (type, name, defaultUri, integrity) {
                    if (type !== 'dotnetjs' && name.endsWith('.br')) {
                        return null;
                    }
                    return defaultUri;
                }
            });
        } else {
            // 💻 PC（ローカル開発用）：通常通りそのまま起動
            Blazor.start();
        }
    </script>
    <script>navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' });</script>
    <script>
        var baseHref = window.location.pathname.endsWith('/')
            ? window.location.pathname
            : window.location.pathname + '/';
        document.write('<base href="' + baseHref + '">');
    </script>
